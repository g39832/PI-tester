name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dds
          POSTGRES_PASSWORD: dds
          POSTGRES_DB: dds
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U dds
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck
        env:
          DATABASE_URL: postgresql://dds:dds@localhost:5432/dds

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://dds:dds@localhost:5432/dds
          JWT_SECRET: test-jwt-secret-at-least-32-characters-long
          NODE_ENV: test

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://dds:dds@localhost:5432/dds
