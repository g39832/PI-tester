services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: disposcan-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_PATH: /data/disposcan.db
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3001:3001"
    volumes:
      - disposcan-data:/data
      - ./reports:/app/reports

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: disposcan-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  disposcan-data:
